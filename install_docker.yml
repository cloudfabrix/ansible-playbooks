---
# Playbook: Install Docker CE on Ubuntu/Debian
# Usage: ansible-playbook 10_install_docker.yml -i inventory.ini
#        -e "docker_users=['ubuntu','deploy']"

- name: Install Docker CE
  hosts: all
  become: true
  vars:
    docker_users:
      - "{{ ansible_user }}"
    docker_compose_version: "v2.27.0"

  tasks:
    - name: Remove old Docker packages if present
      apt:
        name:
          - docker
          - docker-engine
          - docker.io
          - containerd
          - runc
        state: absent

    - name: Install Docker prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Create Docker apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64','amd64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present
        update_cache: true

    - name: Install Docker CE packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"

    - name: Ensure Docker is started and enabled
      service:
        name: docker
        state: started
        enabled: true

    - name: Verify Docker installation
      command: docker --version
      register: docker_ver
      changed_when: false

    - name: Show Docker version
      debug:
        msg: "{{ docker_ver.stdout }}"
