---
# Playbook: Create and enable a swap file
# Usage: ansible-playbook 20_setup_swap.yml -i inventory.ini
#        -e "swap_size_mb=2048"

- name: Create and enable swap file
  hosts: all
  become: true
  vars:
    swap_file_path: /swapfile
    swap_size_mb: 2048       # 2 GB
    swappiness: 10           # Lower = less aggressive swapping
    vfs_cache_pressure: 50

  tasks:
    - name: Check if swap file already exists
      stat:
        path: "{{ swap_file_path }}"
      register: swap_stat

    - name: Create swap file (fallocate)
      command: >
        fallocate -l {{ swap_size_mb }}M {{ swap_file_path }}
      when: not swap_stat.stat.exists

    - name: Set correct permissions on swap file
      file:
        path: "{{ swap_file_path }}"
        mode: "0600"
        owner: root
        group: root

    - name: Format swap file
      command: mkswap {{ swap_file_path }}
      when: not swap_stat.stat.exists

    - name: Enable swap file
      command: swapon {{ swap_file_path }}
      when: not swap_stat.stat.exists

    - name: Persist swap in /etc/fstab
      mount:
        path: none
        src: "{{ swap_file_path }}"
        fstype: swap
        opts: sw
        dump: "0"
        passno: "0"
        state: present

    - name: Set vm.swappiness
      sysctl:
        name: vm.swappiness
        value: "{{ swappiness }}"
        state: present
        reload: true

    - name: Set vm.vfs_cache_pressure
      sysctl:
        name: vm.vfs_cache_pressure
        value: "{{ vfs_cache_pressure }}"
        state: present
        reload: true

    - name: Verify swap is active
      command: swapon --show
      register: swap_show
      changed_when: false

    - name: Display swap info
      debug:
        var: swap_show.stdout_lines
