---
# Playbook: Install Certbot and obtain a Let's Encrypt SSL cert for nginx
# Usage: ansible-playbook 15_install_certbot_ssl.yml -i inventory.ini
#        -e "domain=example.com email=admin@example.com"

- name: Install Certbot and obtain SSL certificate
  hosts: all
  become: true
  vars:
    domain: "example.com"
    extra_domains: []           # Additional SANs: ["www.example.com"]
    email: "admin@example.com"
    webserver: nginx            # nginx or apache
    staging: false              # Set true to use Let's Encrypt staging CA (for testing)
    auto_renew: true

  tasks:
    - name: Install snapd
      apt:
        name: snapd
        state: present
        update_cache: true

    - name: Ensure snapd is running
      service:
        name: snapd
        state: started
        enabled: true

    - name: Install core snap
      community.general.snap:
        name: core
        state: present

    - name: Refresh core snap
      command: snap refresh core
      changed_when: false

    - name: Remove apt certbot if present (avoid conflicts)
      apt:
        name: certbot
        state: absent

    - name: Install Certbot via snap
      community.general.snap:
        name: certbot
        classic: true
        state: present

    - name: Symlink certbot
      file:
        src: /snap/bin/certbot
        dest: /usr/bin/certbot
        state: link
        force: true

    - name: Open port 443 in UFW
      ufw:
        rule: allow
        port: "443"
        proto: tcp
      ignore_errors: true

    - name: Build domain list
      set_fact:
        all_domains: "{{ [domain] + extra_domains }}"

    - name: Obtain SSL certificate
      command: >
        certbot --{{ webserver }}
        --non-interactive
        --agree-tos
        --email {{ email }}
        {% if staging %}--staging{% endif %}
        -d {{ all_domains | join(' -d ') }}
      args:
        creates: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"

    - name: Set up auto-renew cron
      cron:
        name: "certbot renew"
        minute: "0"
        hour: "3"
        weekday: "1"
        job: "certbot renew --quiet --post-hook 'systemctl reload {{ webserver }}'"
        state: "{{ 'present' if auto_renew else 'absent' }}"
